  <script type="text/babel">

const userProfiles = {};
let txnId = 1000;


function genTxn() {
  const id   = `TXN-${txnId++}`;
  const user = USERS[Math.floor(Math.random() * USERS.length)];
  const m    = MERCHANTS[Math.floor(Math.random() * MERCHANTS.length)];
  const loc  = LOCS[Math.floor(Math.random() * LOCS.length)];
  const hour = new Date().getHours();
  const r    = Math.random();

  const amount =
    r < 0.1 ? [1, 10, 100, 1000][Math.floor(Math.random() * 4)]
    : r < 0.2 ? parseFloat((Math.random() * 4000 + 1000).toFixed(2))
    : parseFloat((Math.random() * 200 + 5).toFixed(2));

  // Bootstrap a profile the first time we see a user
  if (!userProfiles[user]) {
    userProfiles[user] = {
      avg:    50 + Math.random() * 100,
      lastCc: loc.cc,
      recent: [],   // timestamps of recent txns (ms)
    };
  }

  const p = userProfiles[user];
  const txn = {
    id,
    user,
    merchant: m.name,
    cat:      m.cat,
    amount,
    loc,
    hour,
    prevCc:   p.lastCc,
    avg:      p.avg,
    recent:   [...p.recent],
    ts:       new Date(),
  };

  // Update profile state
  p.lastCc = loc.cc;
  p.recent.push(Date.now());
  p.recent = p.recent.filter(t => Date.now() - t < 300_000); // 5-min sliding window

  return txn;
}

  <script type="text/babel">

const RULES = [
  {
    id: "velocity",
    name: "Velocity Check",
    desc: "3+ transactions in under 60s",
    weight: 25,
    check: t => t.recent.filter(x => Date.now() - x < 60_000).length >= 3,
  },
  {
    id: "geo",
    name: "Geo Impossibility",
    desc: "Country mismatch from last transaction",
    weight: 30,
    check: t => t.loc.cc !== t.prevCc && t.prevCc !== null,
  },
  {
    id: "round",
    name: "Round Number Flag",
    desc: "Exact $1 / $10 / $100 / $1 000 amount",
    weight: 20,
    check: t => [1, 10, 100, 1000].includes(t.amount),
  },
  {
    id: "hour",
    name: "Unusual Hour",
    desc: "Transaction between 1 AM – 4 AM",
    weight: 15,
    check: t => t.hour >= 1 && t.hour <= 4,
  },
  {
    id: "luxury",
    name: "Merchant Mismatch",
    desc: "Luxury spend from low-avg user",
    weight: 20,
    check: t => t.cat === "luxury" && t.avg < 100,
  },
  {
    id: "spike",
    name: "Amount Spike",
    desc: "5× above user average spend",
    weight: 25,
    check: t => t.amount >= t.avg * 5,
  },
  {
    id: "crypto",
    name: "Crypto Flag",
    desc: "High-risk crypto exchange transaction",
    weight: 15,
    check: t => t.cat === "crypto",
  },
];

function analyze(txn) {
  let score = 0;
  const fired = [];
  const clean = [];

  RULES.forEach(r => {
    if (r.check(txn)) {
      score += r.weight;
      fired.push(r);
    } else {
      clean.push(r);
    }
  });

  score = Math.min(score, 100);

  const status =
    score >= 66 ? "fraud"      :
    score >= 31 ? "suspicious" :
    "safe";

  const reason = fired.length ? fired[0].desc : "No anomalies detected";

  return { score, status, reason, fired, clean };
}

  <script type="text/babel">

function Counter({ value, color }) {
  const [display, setDisplay] = React.useState(0);
  React.useEffect(() => {
    const diff = value - display;
    if (diff === 0) return;
    const step  = Math.ceil(Math.abs(diff) / 4);
    const timer = setTimeout(
      () => setDisplay(d => d + Math.sign(diff) * Math.min(step, Math.abs(diff))),
      40
    );
    return () => clearTimeout(timer);
  }, [value, display]);

  return (
    <span style={{ color, fontFamily: 'var(--font-display)', fontSize: 28, lineHeight: 1 }}>
      {display}
    </span>
  );
}

// ── Stat card with animated counter ──
function StatCard({ label, value, color, icon }) {
  const dimColor =

    'var(--accent-dim)';

  return (
    <div style={{
      background: 'var(--card)',
      border: `1px solid ${color}30`,
      borderRadius: 10,
      padding: '14px 18px',
      display: 'flex', flexDirection: 'column', gap: 6,

      <span style={{ fontSize: 18, position: 'relative', zIndex: 1 }}>{icon}</span>
      <Counter value={value} color={color} />
      <span style={{
        fontSize: 10, color: 'var(--text-dim)',
        letterSpacing: 2, textTransform: 'uppercase',
        fontFamily: 'var(--font-mono)',
      }}>
        {label}

}

// ── Horizontal tab bar ────────────────

  <script type="text/babel">


function Dashboard({ transactions, stats }) {
  const lineRef   = React.useRef(null);
  const pieRef    = React.useRef(null);
  const barRef    = React.useRef(null);
  const lineChart = React.useRef(null);
  const pieChart  = React.useRef(null);
  const barChart  = React.useRef(null);

  const GRID  = '#152034';
  const TICK  = '#4a6688';
  const TFONT = { family: 'DM Mono', size: 10 };
  const BASE  = {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display: false }, tooltip: { enabled: true } },
  };

  // ── Initialise charts once on mount ──
  React.useEffect(() => {
    lineChart.current = new Chart(lineRef.current, {
      type: 'line',
      data: {
        labels: [],
        datasets: [
          {
            label: 'Fraud %',
            data: [], borderColor: '#ff2d55',
            backgroundColor: 'rgba(255,45,85,0.06)',
            borderWidth: 2, pointRadius: 2, fill: true, tension: 0.4,
          },
          {
            label: 'Suspect %',
            data: [], borderColor: '#ffb300',
            backgroundColor: 'rgba(255,179,0,0.04)',
            borderWidth: 1.5, pointRadius: 0, fill: true, tension: 0.4,
          },
        ],
      },
      options: {
        ...BASE,
        scales: {
          x: { ticks: { color: TICK, font: TFONT, maxTicksLimit: 8 }, grid: { color: GRID } },
          y: { ticks: { color: TICK, font: TFONT }, grid: { color: GRID }, min: 0, max: 100 },
        },
      },
    });

    pieChart.current = new Chart(pieRef.current, {
      type: 'doughnut',
      data: {
        labels: [],
        datasets: [{
          data: [],
          backgroundColor: ['#ff2d55','#0ff','#ffb300','#00e676','#448aff','#ff9100','#e040fb','#69f0ae'],
          borderColor: 'var(--card)', borderWidth: 2,
        }],
      },
      options: {
        ...BASE,
        cutout: '68%',
        plugins: {
          legend: {
            display: true, position: 'bottom',
            labels: { color: TICK, font: TFONT, padding: 8, boxWidth: 8 },
          },
        },
      },
    });

    barChart.current = new Chart(barRef.current, {
      type: 'bar',
      data: {
        labels: ['0–20','21–40','41–60','61–80','81–100'],
        datasets: [{
          data: [0,0,0,0,0],
          backgroundColor: ['#00e676','#69f0ae','#ffb300','#ff9100','#ff2d55'],
          borderRadius: 4, borderSkipped: false,
        }],
      },
      options: {
        ...BASE,
        scales: {
          x: { ticks: { color: TICK, font: TFONT }, grid: { color: GRID } },
          y: { ticks: { color: TICK, font: TFONT }, grid: { color: GRID } },
        },
      },
    });

    return () => {
      lineChart.current?.destroy();
      pieChart.current?.destroy();
      barChart.current?.destroy();
    };
  }, []);

  // ── Update charts on every new transaction ──
  React.useEffect(() => {
    if (!transactions.length || !lineChart.current) return;
    const recent = transactions.slice(0, 30).reverse();

    // Rolling fraud / suspect percentage line
    const lc = lineChart.current;
    lc.data.labels = recent.map(t =>
      t.txn.ts.toLocaleTimeString('en', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
    );
    let runFraud = 0, runSuspect = 0;
    const fraudPts = [], suspectPts = [];
    recent.forEach((t, i) => {
      if (t.result.status === 'fraud')      runFraud++;
      if (t.result.status === 'suspicious') runSuspect++;
      fraudPts.push(  Math.round((runFraud   / (i + 1)) * 100));
      suspectPts.push(Math.round((runSuspect / (i + 1)) * 100));
    });
    lc.data.datasets[0].data = fraudPts;
    lc.data.datasets[1].data = suspectPts;
    lc.update('none');

    // Flagged category donut
    const cats = {};
    transactions
      .filter(t => t.result.status !== 'safe')
      .forEach(t => { cats[t.txn.cat] = (cats[t.txn.cat] || 0) + 1; });
    pieChart.current.data.labels             = Object.keys(cats).map(c => c.toUpperCase());
    pieChart.current.data.datasets[0].data   = Object.values(cats);
    pieChart.current.update('none');

    // Risk-score bucket bar
    const buckets = [0, 0, 0, 0, 0];
    transactions.forEach(t => buckets[Math.min(Math.floor(t.result.score / 20), 4)]++);
    barChart.current.data.datasets[0].data = buckets;
    barChart.current.update('none');
  }, [transactions]);

  return (
    <div style={{
      display: 'grid',

// TAB — Fraud Map
// src/tabs/FraudMap.js
// ═══════════════════════════════════════
// Depends on global: L  (Leaflet, loaded via CDN)

function FraudMap({ transactions }) {
  const mapRef      = React.useRef(null);
  const mapInstance = React.useRef(null);
  const markersRef  = React.useRef([]);

  // ── Bootstrap Leaflet map once ────────
  React.useEffect(() => {
    if (mapInstance.current) return;
    mapInstance.current = L.map(mapRef.current, {
      center: [20, 10], zoom: 2,
      zoomControl: true, attributionControl: false,
    });
    L.tileLayer(
      'https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png',
      { subdomains: 'abcd', maxZoom: 19 }
    ).addTo(mapInstance.current);
  }, []);

  // ── Plot the newest transaction as a marker ──
  React.useEffect(() => {
    if (!mapInstance.current || !transactions.length) return;
    const { txn, result } = transactions[0];

    const c =
      result.status === 'fraud'      ? '#ff2d55' :
      result.status === 'suspicious' ? '#ffb300' :
      '#00e676';
    const r =
      result.status === 'fraud'      ? 10 :
      result.status === 'suspicious' ? 7  : 5;

    const marker = L.circleMarker([txn.loc.lat, txn.loc.lng], {
      radius: r, color: c, fillColor: c, fillOpacity: 0.8, weight: 1,
    });

    marker.bindPopup(`
      <div style="line-height:1.7">
        <strong style="color:${c}">${result.status.toUpperCase()}</strong><br/>
        ${txn.id}<br/>
        <strong>$${txn.amount.toLocaleString()}</strong> @ ${txn.merchant}<br/>
        ${txn.loc.city}, ${txn.loc.cc}<br/>
        <span style="color:#4a6688">Score: ${result.score}/100</span>
      </div>
    `);

    marker.addTo(mapInstance.current);
    markersRef.current.push(marker);

    // Keep at most 300 visible markers to avoid memory bloat
    if (markersRef.current.length > 300) {
      mapInstance.current.removeLayer(markersRef.current.shift());
    }
  }, [transactions.length]);   // run when a new txn arrives

  const LEGEND = [['#00e676','SAFE'], ['#ffb300','SUSPICIOUS'], ['#ff2d55','FRAUD']];

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', padding: 20, gap: 12 }}>

      {/* Title + legend */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <span style={{ fontFamily: 'var(--font-display)', fontSize: 22, letterSpacing: 1.5 }}>
          GLOBAL FRAUD HEATMAP
        </span>
        <div style={{ display: 'flex', gap: 16 }}>
          {LEGEND.map(([color, label]) => (
            <span key={label} style={{
              display: 'flex', alignItems: 'center', gap: 6,
              fontFamily: 'var(--font-mono)', fontSize: 11, color: 'var(--text-dim)',
            }}>
              <span style={{
                width: 8, height: 8, borderRadius: '50%',
                background: color, display: 'inline-block',
              }} />
              {label}
            </span>
          ))}
        </div>
      </div>

      {/* Map container — Leaflet renders inside here */}
      <div
        ref={mapRef}
        style={{ flex: 1, borderRadius: 12, border: '1px solid var(--border)', overflow: 'hidden' }}
      />
    </div>
  );
}
  </script>

  <script type="text/babel">

function BankLookup() {
  const [query,   setQuery]   = React.useState('');
  const [loading, setLoading] = React.useState(false);
  const [results, setResults] = React.useState(null);
  const [error,   setError]   = React.useState(null);

  const search = async () => {
    if (!query.trim()) return;
    setLoading(true);
    setError(null);
    setResults(null);

    try {
      const [fdicRes, cfpbRes] = await Promise.all([
        fetch(
          `https://banks.data.fdic.gov/api/institutions` +
          `?search=${encodeURIComponent(query)}` +
          `&fields=NAME,CITY,STNAME,ASSET,INSURED,ACTIVE` +
          `&limit=3&sort_by=ASSET&sort_order=DESC&output=json`
        ),
        fetch(
          `https://api.consumerfinance.gov/data/complaints` +
          `?company=${encodeURIComponent(query)}&field=all&size=100&format=json`
        ),
      ]);

      const fdic = await fdicRes.json();
      const cfpb = await cfpbRes.json();

      const banks      = fdic.data || [];
      const complaints = cfpb.hits?.hits?.map(h => h._source) || [];

      // Aggregate by issue / product category
      const counts = {};
      complaints.forEach(c => {
        const key = c.issue || c.product || 'Other';
        counts[key] = (counts[key] || 0) + 1;
      });
      const topCats = Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, 6);

      setResults({ banks, complaints: topCats, total: complaints.length });
    } catch {
      setError('Could not fetch data. Check your internet connection.');
    }

    setLoading(false);
  };

  return (
    <div style={{ padding: 20, maxWidth: 860, margin: '0 auto', height: '100%', overflow: 'auto' }}>

      {/* Title */}
      <div style={{
        fontFamily: 'var(--font-display)', fontSize: 28,
        letterSpacing: 2, marginBottom: 6,
      }}>
        BANK SAFETY CHECKER
      </div>
      <div style={{ fontSize: 12, color: 'var(--text-dim)', marginBottom: 24 }}>
        Search any US bank to see live FDIC insurance status and CFPB consumer complaint data.
      </div>

      {/* Search bar */}
      <div style={{ display: 'flex', gap: 10, marginBottom: 24 }}>
        <input
          value={query}
          onChange={e => setQuery(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && search()}
          placeholder="e.g. Wells Fargo, Chase, Bank of America…"
          style={{
            flex: 1,
            background: 'var(--card)', border: '1px solid var(--border)',
            borderRadius: 10, padding: '12px 16px',
            color: 'var(--text)', fontFamily: 'var(--font-mono)', fontSize: 13,
            outline: 'none',
          }}
        />
        <button
          onClick={search}
          style={{
            background: 'var(--accent)', color: '#000',
            border: 'none', borderRadius: 10, padding: '12px 28px',
            fontFamily: 'var(--font-display)', fontSize: 18,
            letterSpacing: 2, cursor: 'pointer',
          }}
        >
          SEARCH
        </button>
      </div>

      {/* States */}
      {loading && (
        <div style={{
          textAlign: 'center', color: 'var(--text-dim)',
          fontFamily: 'var(--font-mono)', fontSize: 13, padding: 40,
        }}>
          ⏳ Fetching from FDIC &amp; CFPB…
        </div>
      )}
      {error && (
        <div style={{ color: '#ff2d55', fontFamily: 'var(--font-mono)', fontSize: 12, padding: 20 }}>
          {error}
        </div>
      )}

      {/* Results */}
      {results && (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          {results.banks.length === 0 && (
            <div style={{ color: 'var(--text-dim)', fontFamily: 'var(--font-mono)', fontSize: 13 }}>
              No FDIC institutions found for "{query}".
            </div>
          )}

          {results.banks.map((b, i) => {
            const d       = b.data;
            const insured = d.INSURED === '1' || d.INSURED === 1;
            return (
              <div key={i} style={{
                background: 'var(--card)', border: '1px solid var(--border)',
                borderRadius: 12, padding: 20,
              }}>
                {/* Bank name */}
                <div style={{
                  fontFamily: 'var(--font-display)', fontSize: 22,
                  letterSpacing: 1, marginBottom: 12,
                }}>
                  {d.NAME}
                </div>

                {/* Pill tags */}
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8, marginBottom: 16 }}>
                  <Pill color={insured ? '#00e676' : '#ff2d55'}>
                    {insured ? '✓ FDIC INSURED' : '✗ NOT INSURED'}
                  </Pill>
                  <Pill color="var(--accent)">📍 {d.CITY}, {d.STNAME}</Pill>
                  <Pill color="var(--blue)">
                    💰 Assets: ${d.ASSET ? (d.ASSET / 1000).toFixed(1) + 'B' : 'N/A'}
                  </Pill>
                  <Pill color="#ffb300">📋 {results.total} Complaints</Pill>
                </div>

                {/* CFPB complaint breakdown */}
                {results.complaints.length > 0 && (
                  <>
                    <div style={{
                      fontSize: 10, color: 'var(--text-dim)',
                      fontFamily: 'var(--font-mono)', letterSpacing: 2, marginBottom: 10,
                    }}>
                      TOP COMPLAINT CATEGORIES (CFPB)
                    </div>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
                      {results.complaints.map(([issue, count], j) => (
                        <div key={j} style={{
                          display: 'flex', alignItems: 'center', gap: 12,
                          background: 'var(--panel)', borderRadius: 8, padding: '8px 12px',
                        }}>
                          <span style={{ flex: 1, fontSize: 12 }}>{issue}</span>
                          <div style={{
                            width: 120, height: 4,
                            background: 'var(--border)', borderRadius: 2, overflow: 'hidden',
                          }}>
                            <div style={{
                              width: `${(count / results.complaints[0][1]) * 100}%`,
                              height: '100%', background: '#ff2d55', borderRadius: 2,
                            }} />
                          </div>
                          <span style={{
                            fontFamily: 'var(--font-mono)', fontSize: 12,
                            color: '#ff2d55', minWidth: 32, textAlign: 'right',
                          }}>
                            {count}
                          </span>
                        </div>
                      ))}
                    </div>
                  </>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}
  </script>

  <!-- ═══════════════════════════════════
       5. MODALS
       ═══════════════════════════════════ -->
  <script type="text/babel">

function ReportModal({ stats, onClose }) {
  const fraudRate = stats.total
    ? ((stats.fraud / stats.total) * 100).toFixed(1)
    : '0.0';

  const download = () => {
    const lines = [
      'FRAUDSHIELD REPORT',
      new Date().toLocaleString(),
      '='.repeat(40),
      '',
      `Total Analyzed : ${stats.total}`,
      `Safe           : ${stats.safe}`,
      `Suspicious     : ${stats.suspicious}`,
      `Fraud Blocked  : ${stats.fraud}`,
      `Fraud Rate     : ${fraudRate}%`,
      '',
      stats.fraud > 5
        ? '⚠ HIGH FRAUD VOLUME — immediate review recommended'
        : '✓ Fraud levels within normal parameters',
    ];
    const blob = new Blob([lines.join('\n')], { type: 'text/plain' });
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = `fraudshield-report-${Date.now()}.txt`;
    a.click();
    URL.revokeObjectURL(a.href);
  };

  const ROWS = [
    ['TOTAL ANALYZED', stats.total,      'var(--accent)'],
    ['SAFE',           stats.safe,        '#00e676'],
    ['SUSPICIOUS',     stats.suspicious,  '#ffb300'],
    ['FRAUD BLOCKED',  stats.fraud,       '#ff2d55'],
    ['FRAUD RATE',     `${fraudRate}%`,   '#ff2d55'],
  ];

  return (
    /* Backdrop — click outside to close */
    <div
      onClick={e => e.target === e.currentTarget && onClose()}
      style={{
        position: 'fixed', inset: 0,
        background: 'rgba(0,0,0,0.75)', backdropFilter: 'blur(6px)',
        zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}
    >
      <div style={{
        background: 'var(--card)', border: '1px solid var(--border)',
        borderRadius: 16, padding: 32, width: 500, maxHeight: '80vh', overflow: 'auto',
      }}>

        {/* Header */}
        <div style={{
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          marginBottom: 24,
        }}>
          <span style={{ fontFamily: 'var(--font-display)', fontSize: 26, letterSpacing: 2 }}>
            FRAUD REPORT
          </span>
          <button
            onClick={onClose}
            style={{
              background: 'none', border: '1px solid var(--border)',
              color: 'var(--text-dim)', borderRadius: 8,
              padding: '4px 10px', cursor: 'pointer', fontSize: 16,
            }}
          >
            ✕
          </button>
        </div>

        {/* Stat rows */}
        {ROWS.map(([label, value, color]) => (
          <div key={label} style={{
            display: 'flex', justifyContent: 'space-between', alignItems: 'center',
            padding: '14px 16px', background: 'var(--panel)',
            borderRadius: 8, marginBottom: 8,
          }}>
            <span style={{
              fontSize: 11, color: 'var(--text-dim)',
              fontFamily: 'var(--font-mono)', letterSpacing: 1.5,
            }}>
              {label}
            </span>
            <span style={{ fontFamily: 'var(--font-display)', fontSize: 24, color }}>
              {value}
            </span>
          </div>
        ))}

        {/* Status banner */}
        <div style={{
          marginTop: 8, padding: '12px 16px',
          background: 'var(--red-dim)',
          border: '1px solid rgba(255,45,85,0.2)',
          borderRadius: 8, fontSize: 12,
          color: stats.fraud > 5 ? '#ff2d55' : '#00e676',
        }}>
          {stats.fraud > 5
            ? '⚠ High fraud volume — immediate review recommended'
            : '✓ Fraud levels within normal parameters'}
        </div>

        {/* Download */}
        <button
          onClick={download}
          style={{
            marginTop: 20, width: '100%',
            background: 'var(--accent)', color: '#000',
            border: 'none', borderRadius: 8, padding: 12,
            fontFamily: 'var(--font-display)', fontSize: 18,
            letterSpacing: 2, cursor: 'pointer',
          }}
        >
          DOWNLOAD REPORT
        </button>
      </div>
    </div>
  );
}
  </script>

  <script type="text/babel">

const { useState, useEffect, useCallback, useMemo } = React;

function App() {
  const [tab,          setTab]          = useState('DASHBOARD');
  const [transactions, setTransactions] = useState([]);
  const [paused,       setPaused]       = useState(false);
  const [showReport,   setShowReport]   = useState(false);

  // Derived counters — only recalculated when transactions array changes
  const stats = useMemo(() => ({
    total:      transactions.length,
    safe:       transactions.filter(t => t.result.status === 'safe').length,
    suspicious: transactions.filter(t => t.result.status === 'suspicious').length,
    fraud:      transactions.filter(t => t.result.status === 'fraud').length,
  }), [transactions]);

  const addTxn = useCallback(() => {
    const txn    = genTxn();
    const result = analyze(txn);
    setTransactions(prev => [{ txn, result }, ...prev].slice(0, 200));
  }, []);

  // Seed 12 transactions on first load
  useEffect(() => {
    const seed = [];
    for (let i = 0; i < 12; i++) {
      const txn    = genTxn();
      const result = analyze(txn);
      seed.push({ txn, result });
    }
    setTransactions(seed);
  }, []);

  // Live stream: new transaction every 1.8 s
  useEffect(() => {
    if (paused) return;
    const id = setInterval(addTxn, 1800);
    return () => clearInterval(id);
  }, [paused, addTxn]);

  return (
    <div style={{ height: '100%', display: 'flex', flexDirection: 'column', background: 'var(--void)' }}>
      <Header
        stats={stats}
        paused={paused}
        onToggle={() => setPaused(p => !p)}
        onReport={() => setShowReport(true)}
      />
      <Tabs active={tab} onChange={setTab} />

      <div style={{ flex: 1, overflow: 'hidden' }}>
        {tab === 'DASHBOARD'   && <Dashboard   transactions={transactions} stats={stats} />}
        {tab === 'LIVE FEED'   && <LiveFeed    transactions={transactions} paused={paused} />}
        {tab === 'FRAUD MAP'   && <FraudMap    transactions={transactions} />}
        {tab === 'SIMULATOR'   && <Simulator />}
        {tab === 'BANK LOOKUP' && <BankLookup />}
      </div>

      {showReport && (
        <ReportModal stats={stats} onClose={() => setShowReport(false)} />
      )}
    </div>
  );
}

// ── Mount ─────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>

</body>
